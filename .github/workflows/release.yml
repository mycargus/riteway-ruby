name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    if: github.repository == 'mycargus/riteway-ruby'
    name: Publish to RubyGems
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment: release

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Verify tag matches version
        run: ruby scripts/verify_release_tag.rb "${GITHUB_REF_NAME}"

      - name: Run lint
        run: bundle exec rake lint

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem
        run: bundle exec rake build

      - name: Configure RubyGems trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Publish to RubyGems
        run: gem push pkg/*.gem

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" pkg/*.gem \
            --title "riteway ${GITHUB_REF_NAME}" \
            --notes "See [CHANGELOG](https://github.com/mycargus/riteway-ruby/blob/main/CHANGELOG.md) for details."
